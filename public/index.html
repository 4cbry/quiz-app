<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/estilo.css">
  <title>Game Quiz</title>
</head>
<body>
  <div class="container">
    <img src="img/auris.png" alt="" class="img">
    <header>
      <div class="puntaje"><img src="img/puntos.png" alt=""><span class="puntos">0</span></div>
      <h1>QUIZ</h1>
      <div class="jugador"><span class="nombre">-</span><img src="img/user.png" alt=""></div>
    </header>

    <main class="inicio">
      <h2>¡Bienvenido!</h2>
      <p>Ingresa tu nombre para jugar</p>
      <input type="text" id="nombre" placeholder="Tu nombre..." maxlength="50">
      <p id="error-msg" style="color:red;display:none;margin-top:0.5rem;"></p>
      <button class="btn" id="comenzar">Comenzar</button>
      <p style="margin-top:2rem;font-size:0.85rem;opacity:0.6;">
        ¿Eres administrador? <a href="/admin" style="color:#a78bfa;">Ir al panel</a>
      </p>
    </main>
  </div>
  <script src="js/index.js"></script>
</body>
</html>
